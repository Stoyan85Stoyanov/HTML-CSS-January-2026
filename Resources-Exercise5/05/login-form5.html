<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./login-form5.css">
</head>

<body>
    <form action="" class="login">
        <h2>Registration</h2>

        <fieldset>
            <legend>Login Infomation</legend>
            <p class="field">
                <input type="email" id="email" required>
                <label for="email">Email</label>
                <span class="helper-text">example: john.doe@gmail.com</span>
            </p>

            <p class="field">
                <input type="password" id="password" required>
                <label for="password">Password</label>
                <span class="helper-text">minimum 6 characters, letters and numbers, at least 1 special character</span>
            </p>

        </fieldset>

        <fieldset>
            <legend>Additional information</legend>
            <p class="field">
                <!-- <input type="datetime-local" id="date" required> -->
                 <input type="date" id="date" required>
                <label for="date">Date of Birth</label>
                <span class="helper-text">example: john.doe@gmail.com</span>
            </p>
        </fieldset>

        <input type="submit" value="Login">
    </form>
</body>

</html>
