<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp Form</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="card">
        <div class="tabs">
            <div class="tab active">Sign Up</div>
            <div class="tab login">Log In</div>
        </div>

        <h1>Sign Up for Free</h1>

        <div class="row">
            <div class="field">
                <input type="text" placeholder=" ">
                <span class="fake-placeholder">
                    First Name<span class="star">*</span>
                </span>
            </div>

            <div class="field">
                <input type="text" placeholder=" ">
                <span class="fake-placeholder">
                    Last Name<span class="star">*</span>
                </span>
            </div>
        </div>

        <div class="field">
            <input type="email" placeholder=" ">
            <span class="fake-placeholder">
                Email Address<span class="star">*</span>
            </span>
        </div>

        <div class="field">
            <input type="password" placeholder=" ">
            <span class="fake-placeholder">
                Set A Password<span class="star">*</span>
            </span>
        </div>

        <button>Get Started</button>
    </div>
</body>

</html>
